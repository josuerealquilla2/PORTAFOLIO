<nav class="navbar" [class.scrolled]="scrolled()">
  <div class="nav-inner container">

    <button class="nav-logo" (click)="scrollTo('home')">
      JOSUE<span class="accent">.</span>DEV
    </button>

    <ul class="nav-links" [class.open]="menuOpen()">
      @for (item of navItems(); track item.anchor) {
        <li>
          <button
            class="nav-link"
            [class.active]="activeSection() === item.anchor"
            (click)="scrollTo(item.anchor)">
            <span class="nav-num">{{ item.number }}</span>
            {{ item.label }}
          </button>
        </li>
      }
    </ul>

    <div class="nav-actions">
      <!-- Toggle dark/light -->
      <button class="icon-btn" (click)="toggleTheme()" [title]="isDark() ? 'Modo claro' : 'Modo oscuro'">
        @if (isDark()) {
          <!-- Sun icon -->
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1"  x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22"   x2="5.64"  y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1"  y1="12" x2="3"  y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78"  x2="5.64"  y2="18.36"/>
            <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"/>
          </svg>
        } @else {
          <!-- Moon icon -->
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>

      <!-- Toggle idioma -->
      <button class="icon-btn lang-btn" (click)="toggleLang()" [title]="'Cambiar idioma'">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span>{{ langLabel() }}</span>
      </button>

      <!-- Hamburger mobile -->
      <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen()">
        <span></span><span></span><span></span>
      </button>
    </div>

  </div>
</nav>
